<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Ideas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <h1 class="brand-title">Skillfeed</h1>
        <p class="brand-sub">Startup ideas board.</p>
      </div>
      <button class="ghost-btn" onclick="logout()">Logout</button>
    </header>

    <main class="app-main">

      <section class="hero-card">
        <div class="hero-top">
          <div>
            <h2>Post a startup idea</h2>
            <p>Share what you want to build and attract the right collaborators.</p>
          </div>
          <span class="pill">Ideas</span>
        </div>

        <div class="form-stack">
          <input id="ideaTitle" type="text" placeholder="Idea title (e.g. AI Fitness Coach)" />
          <textarea id="ideaDesc" placeholder="Describe your idea and who you need..."></textarea>
          <button class="primary-btn" id="postIdeaBtn" type="button">Post New Idea</button>
          <div class="status-text" id="status"></div>
        </div>
      </section>

      <section class="section-head">
        <div>
          <h3>Posted Ideas</h3>
          <p>Explore and join startup concepts from the community</p>
        </div>
        <span class="pill"><span id="count">0</span> posts</span>
      </section>

      <section class="feed-list" id="ideasList"></section>

    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="/home.html">
        <i data-lucide="house"></i>
        <small>Home</small>
      </a>
      <a class="nav-item active" href="/ideas.html">
        <i data-lucide="lightbulb"></i>
        <small>Ideas</small>
      </a>
      <a class="nav-item" href="/people.html">
        <i data-lucide="users"></i>
        <small>People</small>
      </a>
      <a class="nav-item" href="/messages.html">
        <i data-lucide="message-circle"></i>
        <small>Messages</small>
      </a>
      <a class="nav-item" href="/profile.html">
        <i data-lucide="user"></i>
        <small>Profile</small>
      </a>
    </nav>

  </div>

  <script>
    function logout() {
      localStorage.removeItem("skillfeed_logged_in");
      window.location.href = "/index.html";
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="ideas.js"></script>
</body>
</html>
