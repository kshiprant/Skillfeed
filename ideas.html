<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skillfeed | Ideas</title>
<link rel="stylesheet" href="style.css">
</head>

<body data-protected="1">
<div class="phone">

  <div class="topbar">
    <div class="brand">Skillfeed</div>
    <div class="sub">Startup ideas board.</div>
  </div>

  <div class="nav">
    <a href="/home.html">Home</a>
    <a class="active" href="/ideas.html">Ideas</a>
    <a href="/people.html">Find People</a>
    <a href="/messages.html">Messages</a>
    <a href="/profile.html">Profile</a>
    <a href="/create-profile.html">Create Profile</a>
    <button type="button" onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div class="card grid" style="margin-top:10px;">
      <div class="h1" style="margin:0;">Post a Startup Idea</div>
      <input id="ideaTitle" placeholder="Idea title (e.g. AI Fitness Coach)">
      <textarea id="ideaDesc" placeholder="Describe your idea and who you need..."></textarea>
      <button class="btn" id="postIdeaBtn" type="button">Post New Idea</button>
      <div class="status" id="status"></div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="row">
        <div class="h1" style="margin:0;">Posted Ideas</div>
        <span class="badge"><span id="count">0</span> Posts</span>
      </div>

      <div class="hr"></div>

      <div class="list" id="ideasList"></div>
    </div>

  </div>

  <div class="footer">Developed by Kshiprant</div>

</div>

<script type="module" src="auth.js?v=1"></script>
<script type="module" src="ideas.js?v=1"></script>
</body>
</html>
