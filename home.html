<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Home</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-protected="1">
  <div class="phone">
    <div class="topbar">
      <div class="brand">Skillfeed</div>
      <div class="sub">Your startup collaboration hub.</div>
    </div>

    <div class="nav">
      <a class="active" href="/home.html">Home</a>
      <a href="/ideas.html">Ideas</a>
      <a href="/people.html">Find People</a>
      <a href="/messages.html">Messages</a>
      <a href="/profile.html">Profile</a>
      <button type="button" onclick="logout()">Logout</button>
    </div>

    <div class="main">
      <div class="card">
        <div class="row">
          <div>
            <div class="h1">Welcome to Skillfeed</div>
            <div class="small" style="text-align:left;">
              Build startups with the right people. Post your idea directly from here and find the right people to build with.
            </div>
          </div>
          <span class="badge">Level system ready</span>
        </div>

        <div class="hr"></div>

        <div class="grid" style="margin-top:12px;">
          <input id="homeIdeaTitle" placeholder="Idea title (e.g. AI Fitness Coach)">
          <textarea id="homeIdeaDesc" placeholder="Describe your idea and who you need..."></textarea>
          <button class="btn" id="homePostIdeaBtn" type="button">Post Idea</button>
          <div class="status" id="homeStatus"></div>

          <button class="btn secondary" type="button" onclick="window.location.href='/people.html'">
            Explore People
          </button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div class="h1">Startup Feed</div>
          <span class="badge"><span id="count">0</span> Posts</span>
        </div>

        <div class="hr"></div>

        <div id="ideasList"></div>
      </div>
    </div>

    <div class="footer">Developed by Kshiprant</div>
  </div>

  <script type="module" src="auth.js?v=1"></script>
  <script type="module" src="home.js"></script>
</body>
</html>
