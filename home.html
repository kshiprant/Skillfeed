<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Home</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <h1 class="brand-title">Skillfeed</h1>
        <p class="brand-sub">Build startups with the right people.</p>
      </div>
      <button class="ghost-btn" onclick="logout()">Logout</button>
    </header>

    <main class="app-main">

      <section class="hero-card">
        <div class="hero-top">
          <div>
            <h2>Post your startup idea</h2>
            <p>Find builders, collaborators, and future co-founders.</p>
          </div>
          <span class="pill">Live MVP</span>
        </div>

        <div class="form-stack">
          <input id="homeIdeaTitle" type="text" placeholder="Idea title (e.g. AI Fitness Coach)" />
          <textarea id="homeIdeaDesc" placeholder="Describe your idea, vision, and who you need..."></textarea>
          <button class="primary-btn" id="homePostIdeaBtn" type="button">Post Idea</button>
          <div id="homeStatus" class="status-text"></div>
        </div>
      </section>

      <section class="section-head">
        <div>
          <h3>Startup Feed</h3>
          <p>Fresh ideas from your network</p>
        </div>
        <span class="pill"><span id="count">0</span> posts</span>
      </section>

      <section id="ideasList" class="feed-list"></section>

    </main>

    <nav class="bottom-nav">
      <a class="nav-item active" href="/home.html">
        <span>🏠</span>
        <small>Home</small>
      </a>
      <a class="nav-item" href="/ideas.html">
        <span>💡</span>
        <small>Ideas</small>
      </a>
      <a class="nav-item" href="/people.html">
        <span>👥</span>
        <small>People</small>
      </a>
      <a class="nav-item" href="/messages.html">
        <span>💬</span>
        <small>Messages</small>
      </a>
      <a class="nav-item" href="/profile.html">
        <span>👤</span>
        <small>Profile</small>
      </a>
    </nav>

  </div>

  <script>
    function logout() {
      localStorage.removeItem("skillfeed_logged_in");
      window.location.href = "/index.html";
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(console.error);
      });
    }
  </script>

  <script src="home.js"></script>
</body>
</html>
