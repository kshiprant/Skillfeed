<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Home</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-protected="1">
  <div class="phone">
    <div class="topbar">
      <div class="brand">Skillfeed</div>
      <div class="sub">Your startup collaboration hub.</div>
    </div>

    <div class="nav">
      <a class="active" href="/home.html">Home</a>
      <a href="/ideas.html">Ideas</a>
      <a href="/people.html">Find People</a>
      <a href="/messages.html">Messages</a>
      <a href="/profile.html">Profile</a>
      <a href="/create-profile.html">Create Profile</a>
      <button type="button" onclick="logout()">Logout</button>
    </div>

    <div class="main">
      <div class="card">
        <div class="row">
          <div>
            <div class="h1">Welcome to Skillfeed</div>
            <div class="small" style="text-align:left;">
              Build startups with the right people. Create your profile to appear on Find People.
            </div>
          </div>
          <span class="badge">Level system ready</span>
        </div>

        <div class="hr"></div>

        <div class="grid">
          <button class="btn" type="button" onclick="window.location.href='/create-profile.html'">
            Create / Update Profile
          </button>
          <button class="btn secondary" type="button" onclick="window.location.href='/people.html'">
            Explore People
          </button>
        </div>
      </div>
    </div>

    <div class="footer">Developed by Kshiprant</div>
  </div>

  <script type="module" src="auth.js?v=1"></script>
</body>
</html>
