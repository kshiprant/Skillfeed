<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skillfeed Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body data-protected="1">

<div class="phone">

  <div class="topbar">
    <div class="brand">Skillfeed</div>
    <div class="sub">Build startups with the right people.</div>
  </div>

  <div class="nav">
    <a class="active" href="/home.html">Home</a>
    <a href="/ideas.html">Ideas</a>
    <a href="/people.html">Find People</a>
    <a href="/messages.html">Messages</a>
    <a href="/profile.html">Profile</a>
    <a href="/create-profile.html">Create Profile</a>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div class="h1">Dashboard</div>

    <div class="card grid">

      <div class="row">
        <span class="badge">Add Skill</span>
      </div>

      <input id="skill" placeholder="Skill name">
      <input id="level" placeholder="Level 1-10">

      <button class="btn" onclick="addSkill()">Post Skill</button>

    </div>

    <div class="hr"></div>

    <div class="card grid">

      <div class="row">
        <span class="badge">Create Startup Idea</span>
      </div>

      <input id="ideaTitle" placeholder="Idea title">
      <textarea id="ideaDesc" placeholder="Describe idea"></textarea>

      <button class="btn" onclick="postIdea()">Post Idea</button>

    </div>

    <div class="hr"></div>

    <div class="card grid">

      <div class="row">
        <span class="badge">Find Co-Founder</span>
      </div>

      <input id="searchSkill" placeholder="Search skill">

      <button class="btn secondary" onclick="searchSkill()">Search</button>
