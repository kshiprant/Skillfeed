<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Connect</title>
  <link rel="stylesheet" href="messaging.css" />
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <div class="logo">Skillfeed</div>
      <div class="subtitle">Connect with collaborators</div>
    </header>

    <div class="searchBox">
      <input type="text" placeholder="Search conversations..." />
    </div>

    <div class="chatList" id="chatList"></div>

    <div class="emptyState" id="emptyState">
      <div class="emptyIcon">💬</div>
      <h2>No conversations yet</h2>
      <p>You don’t have any connections or active chats right now.</p>
      <button class="exploreBtn" onclick="window.location.href='/people.html'">
        Explore People
      </button>
    </div>

    <footer class="footer">
      Developed by Kshiprant
    </footer>
  </div>

  <script src="connect.js"></script>
</body>
</html>
