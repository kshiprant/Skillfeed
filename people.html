<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Find People</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <h1 class="brand-title">Skillfeed</h1>
        <p class="brand-sub">Discover builders nearby and worldwide.</p>
      </div>
      <button class="ghost-btn" onclick="logout()">Logout</button>
    </header>

    <main class="app-main">

      <section class="section-head" style="margin-top: 4px;">
        <div>
          <h3>Find People</h3>
          <p>Search creators, builders, and collaborators</p>
        </div>
        <span class="pill"><span id="count">0</span> users</span>
      </section>

      <section class="hero-card">
        <div class="hero-top">
          <div>
            <h2>Search by username</h2>
            <p>Find people by username, name, skills, or startup interest.</p>
          </div>
          <span class="pill">People</span>
        </div>

        <div class="form-stack">
          <input id="searchUser" type="text" placeholder="Search by username..." />
          <div class="status-text" id="status"></div>
        </div>
      </section>

      <section class="feed-list" id="list"></section>

    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="/home.html">
        <i data-lucide="house"></i>
        <small>Home</small>
      </a>
      <a class="nav-item" href="/ideas.html">
        <i data-lucide="lightbulb"></i>
        <small>Ideas</small>
      </a>
      <a class="nav-item active" href="/people.html">
        <i data-lucide="users"></i>
        <small>People</small>
      </a>
      <a class="nav-item" href="/messages.html">
        <i data-lucide="message-circle"></i>
        <small>Messages</small>
      </a>
      <a class="nav-item" href="/profile.html">
        <i data-lucide="user"></i>
        <small>Profile</small>
      </a>
    </nav>

  </div>

  <script>
    function logout() {
      localStorage.removeItem("skillfeed_logged_in");
      window.location.href = "/index.html";
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="people.js"></script>
</body>
</html>
