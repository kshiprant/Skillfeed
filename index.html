<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Login</title>
  <link rel="stylesheet" href="style.css?v=10" />
  <meta name="theme-color" content="#2563eb" />
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <h1 class="brand-title">Skillfeed</h1>
        <p class="brand-sub">Build startups with the right people.</p>
      </div>
    </header>

    <main class="app-main">

      <section class="hero-card" style="margin-top: 18px;">
        <div class="hero-top">
          <div>
            <h2>Login</h2>
            <p>Access your network, ideas, and profile.</p>
          </div>
          <span class="pill">Welcome</span>
        </div>

        <div class="form-stack">
          <input id="email" type="email" placeholder="Email" autocomplete="email" />
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="loginBtn" class="primary-btn" type="button">Login</button>
          <button id="signupBtn" class="secondary-btn" type="button">Create new account</button>
          <div id="status" class="status-text"></div>
        </div>
      </section>

      <section class="hero-card">
        <div class="hero-top">
          <div>
            <h2>Why Skillfeed?</h2>
            <p>Find startup ideas, collaborators, and builders in one place.</p>
          </div>
          <span class="pill">MVP</span>
        </div>

        <div class="tags-wrap">
          <span class="tag">Ideas</span>
          <span class="tag">Builders</span>
          <span class="tag">Profiles</span>
          <span class="tag">Collaboration</span>
        </div>
      </section>

      <div class="footer">Developed by Kshiprant</div>

    </main>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((reg) => reg.unregister());
      });
    }
    if ("caches" in window) {
      caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)));
    }
  </script>

 <script src="api-client.js" type="module"></script>
<script src="auth.js" type="module"></script>
<script src="login.js" type="module"></script>
</body>
</html>
