<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillfeed | Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

  <div class="topbar">
    <div class="brand">Skillfeed</div>
    <div class="sub">Create your account.</div>
  </div>

  <div class="main">

    <div class="h1">Register</div>

    <div class="card grid">
      <input id="email" placeholder="Email" type="email" autocomplete="email">

      <input id="password" placeholder="Password (min 6 chars)" type="password" autocomplete="new-password">

      <button class="btn" id="registerBtn" type="button">
        Create Account
      </button>

      <button class="btn secondary" type="button"
        onclick="window.location.href='/index.html'">
        Back to login
      </button>

      <div class="status" id="status"></div>
    </div>

  </div>

  <div class="footer">
    Developed by Kshiprant
  </div>

</div>

<script type="module" src="register.js?v=1"></script>

</body>
</html>
