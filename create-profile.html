<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillfeed | Create Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-protected="1">
  <div class="phone">
    <div class="topbar">
      <div class="brand">Skillfeed</div>
      <div class="sub">Create your profile to show up on Find People.</div>
    </div>

    <div class="nav">
      <a href="/home.html">Home</a>
      <a href="/ideas.html">Ideas</a>
      <a href="/people.html">Find People</a>
      <a href="/messages.html">Messages</a>
      <a href="/profile.html">Profile</a>
      <a class="active" href="/create-profile.html">Create Profile</a>
      <button type="button" onclick="logout()">Logout</button>
    </div>

    <div class="main">
      <div class="h1">Create Your Profile</div>

      <div class="card grid">
        <input id="name" placeholder="Your Name" autocomplete="name">
        <input id="skills" placeholder="Your Skills (e.g. React, AI, Marketing)">
        <input id="location" placeholder="Location (City, Country)">
        <input id="startup" placeholder="Startup Interest (e.g. SaaS, AI, FinTech)">
        <textarea id="bio" placeholder="Short bio"></textarea>

        <select id="level">
          <option value="1">Level 1 - Learner</option>
          <option value="2">Level 2 - Contributor</option>
          <option value="3">Level 3 - Builder</option>
          <option value="4">Level 4 - Founder</option>
          <option value="5">Level 5 - Expert</option>
        </select>

        <button class="btn" id="saveBtn" type="button">Save Profile</button>
        <div class="status" id="status"></div>
      </div>
    </div>

    <div class="footer">Developed by Kshiprant</div>
  </div>

  <script type="module" src="auth.js?v=1"></script>
  <script type="module" src="profile-save.js?v=1"></script>
</body>
</html>
