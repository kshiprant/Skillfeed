<!DOCTYPE html>
<html>

<head>

<title>Create Profile | Skillfeed</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Skillfeed</h1>

</header>

<div class="container">

<h2>Create Your Profile</h2>

<input id="name" placeholder="Your Name">

<input id="skills" placeholder="Your Skills (e.g. React, AI, Marketing)">

<input id="location" placeholder="Location">

<input id="startup" placeholder="Startup Interest">

<textarea id="bio" placeholder="Short Bio"></textarea>

<select id="level">

<option value="1">Level 1 - Learner</option>
<option value="2">Level 2 - Contributor</option>
<option value="3">Level 3 - Builder</option>
<option value="4">Level 4 - Founder</option>
<option value="5">Level 5 - Expert</option>

</select>

<button onclick="saveProfile()">Save Profile</button>

</div>

<footer>
Developed by Kshiprant
</footer>

<script type="module" src="profile.js"></script>

</body>

</html>
